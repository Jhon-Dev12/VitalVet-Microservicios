spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: MICRO-AGENDA
          uri: lb://MICRO-AGENDA
          predicates:
            - Path=/api/agenda/**
        - id: MICRO-PACIENTE
          uri: lb://MICRO-PACIENTE
          predicates:
            - Path=/api/paciente/**
        - id: MICRO-USUARIO
          uri: lb://MICRO-USUARIO
          predicates:
            - Path=/api/usuario/**
        - id: MICRO-AUD
          uri: lb://MICRO-AUD
          predicates:
            - Path=/api/aud/**
server:
  port: 8091
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost